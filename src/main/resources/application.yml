spring:
  application:
    name: plm-system

  datasource:
    url: jdbc:postgresql://localhost:5432/plm
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
      pool-name: PLM-HikariPool
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
        generate_statistics: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    user:
      name: admin
      password: admin

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always

flowable:
  database-schema-update: true
  async-executor-activate: true

jwt:
  secret: ${JWT_SECRET:plmSystemSecretKeyThatIsLongEnoughForHS256Algorithm2024!}
  expiration: 86400000  # 24 hours in milliseconds
