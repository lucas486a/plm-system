spring:
  datasource:
    url: jdbc:h2:mem:plmtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

  security:
    user:
      name: admin
      password: admin

flowable:
  database-schema-update: true
